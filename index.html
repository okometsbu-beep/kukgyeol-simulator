<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#17131f">
  <meta name="description" content="진짜 사랑과 계획된 사기 사이에서 대화하고, 조사하고, 증거로 판단하는 국제연애 미스터리 게임">
  <title>진심의 증거 · 국제연애 미스터리</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <a class="skip-link" href="#main">게임으로 바로가기</a>

  <main id="main" class="app-shell">
    <section id="title-screen" class="screen title-screen">
      <div class="title-art" aria-hidden="true">
        <div class="title-art__shade"></div>
        <div class="title-art__stamp">CASE 01</div>
      </div>
      <div class="title-copy">
        <p class="eyebrow">국제연애 미스터리</p>
        <h1>진심의 증거</h1>
        <p class="tagline">그녀의 말은 진심일까.<br>아니면 누군가 짜 놓은 대본일까.</p>
        <div class="title-actions">
          <button id="new-game" class="primary-button" type="button">새 사건 시작</button>
          <button id="continue-game" class="ghost-button" type="button" hidden>저장한 사건 이어하기</button>
          <button id="how-to" class="text-button" type="button">게임 방법</button>
        </div>
        <p class="content-note">모든 인물과 사건은 허구이며, 국적·직업·외모는 사기의 증거가 아닙니다.</p>
      </div>
    </section>

    <section id="setup-screen" class="screen setup-screen" hidden>
      <header class="plain-header">
        <button class="icon-button" data-action="back-title" type="button" aria-label="처음으로">←</button>
        <div>
          <p class="eyebrow">사건 준비</p>
          <h2 id="setup-title">주인공을 고르세요</h2>
        </div>
        <span id="setup-step" class="step-badge">1 / 4</span>
      </header>
      <div class="setup-progress" aria-hidden="true"><span id="setup-progress-bar"></span></div>
      <p id="setup-guide" class="setup-guide"></p>
      <div id="setup-grid" class="selection-grid"></div>
      <div id="setup-summary" class="setup-summary" hidden></div>
      <button id="setup-next" class="primary-button sticky-next" type="button" disabled>다음</button>
    </section>

    <section id="game-screen" class="screen game-screen" hidden>
      <header class="status-bar">
        <div class="case-progress">
          <span id="chapter-label">1장</span>
          <strong id="phase-label">첫 연락</strong>
        </div>
        <div class="status-pills">
          <button id="money-pill" class="status-pill" type="button" aria-label="재정 상세">💳 <span id="cash-label">0원</span></button>
          <span class="status-pill" title="호감">💗 <span id="affection-label">50</span></span>
          <span class="status-pill" title="갈등">⚠️ <span id="conflict-label">0</span></span>
        </div>
      </header>

      <div class="game-layout">
        <section class="novel-stage" aria-live="polite">
          <section class="duo-hud" aria-label="두 사람의 현재 상태">
            <article class="hud-person hud-player">
              <div class="hud-heading"><span>주인공</span><strong id="player-hud-name"></strong></div>
              <div class="ability-grid">
                <span>말재주 <b id="stat-charm"></b></span>
                <span>공감 <b id="stat-empathy"></b></span>
                <span>판단 <b id="stat-reason"></b></span>
                <span>배짱 <b id="stat-courage"></b></span>
              </div>
            </article>
            <article class="hud-person hud-partner">
              <div class="hud-heading"><span>두 사람</span><strong id="relationship-hud"></strong></div>
              <div class="ability-grid relationship-grid">
                <span>호감 <b id="hud-affection"></b></span>
                <span>신뢰 <b id="hud-trust"></b></span>
                <span>갈등 <b id="hud-conflict"></b></span>
                <span>아이 <b id="hud-children"></b></span>
              </div>
            </article>
          </section>

          <div id="scene-visual" class="scene-visual">
            <div class="scene-gradient"></div>
            <div id="scene-caption" class="scene-caption"></div>
            <div id="portrait-wrap" class="portrait-wrap" hidden>
              <div id="partner-portrait" class="portrait-photo"></div>
            </div>
          </div>

          <div class="objective-card">
            <span>이번 장의 목표</span>
            <strong id="objective-text"></strong>
          </div>

          <div id="dialogue-box" class="dialogue-box">
            <p id="scene-context" class="scene-context"></p>
            <div class="speaker-row">
              <strong id="speaker-name"></strong>
              <span id="speaker-mood" class="mood-chip"></span>
            </div>
            <p id="dialogue-text"></p>
          </div>

          <div id="statement-box" class="statement-box" hidden>
            <span class="statement-label">확인할 진술</span>
            <blockquote id="statement-text"></blockquote>
            <p id="statement-note"></p>
          </div>

          <div id="feedback-box" class="feedback-box" hidden></div>
          <div id="choices" class="choice-list"></div>
        </section>

        <aside class="case-sidebar">
          <section class="side-card current-case-card">
            <div class="partner-mini">
              <div id="partner-mini-photo" class="partner-mini-photo"></div>
              <div>
                <span id="partner-country" class="mini-label"></span>
                <strong id="partner-name"></strong>
                <p id="relationship-label"></p>
              </div>
            </div>
          </section>

          <section class="side-card">
            <div class="side-title"><h3>사건 수첩</h3><span id="evidence-count">0개</span></div>
            <div id="notebook-preview" class="notebook-preview"></div>
            <button id="open-notebook" class="secondary-button full-button" type="button">수첩 열기</button>
          </section>

          <section class="side-card finance-card">
            <div class="side-title"><h3>지금 상황</h3></div>
            <dl>
              <div><dt>남은 현금</dt><dd id="side-cash"></dd></div>
              <div><dt>빚</dt><dd id="side-debt"></dd></div>
              <div><dt>누적 지출</dt><dd id="side-spent"></dd></div>
              <div><dt>남은 일정</dt><dd id="side-days"></dd></div>
            </dl>
          </section>

          <div class="utility-buttons">
            <button id="save-button" class="text-button" type="button">저장</button>
            <button id="restart-button" class="text-button danger-text" type="button">사건 다시 시작</button>
          </div>
        </aside>
      </div>

      <nav class="mobile-dock" aria-label="게임 메뉴">
        <button id="mobile-notebook" type="button"><span>📓</span>사건 수첩</button>
        <button id="mobile-status" type="button"><span>💳</span>재정</button>
        <button id="mobile-save" type="button"><span>💾</span>저장</button>
      </nav>
    </section>

    <section id="ending-screen" class="screen ending-screen" hidden>
      <div id="ending-visual" class="ending-visual"></div>
      <div class="ending-copy">
        <p id="ending-grade" class="eyebrow"></p>
        <h2 id="ending-title"></h2>
        <p id="ending-text" class="ending-lead"></p>
        <div id="ending-stats" class="ending-stats"></div>
        <details class="truth-report">
          <summary>이 사건의 진실 보기</summary>
          <div id="truth-report-body"></div>
        </details>
        <div class="ending-actions">
          <button id="retry-case" class="primary-button" type="button">다른 가능성으로 다시</button>
          <button id="back-title-end" class="ghost-button" type="button">처음 화면</button>
        </div>
      </div>
    </section>
  </main>

  <div id="overlay" class="overlay" hidden>
    <section id="modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <header class="modal-header">
        <div><p id="modal-kicker" class="eyebrow"></p><h2 id="modal-title"></h2></div>
        <button id="close-modal" class="icon-button" type="button" aria-label="닫기">✕</button>
      </header>
      <div id="modal-body" class="modal-body"></div>
    </section>
  </div>

  <div id="roll-overlay" class="roll-overlay" role="status" aria-live="assertive" hidden>
    <section class="roll-card">
      <p class="eyebrow">능력 판정</p>
      <div id="roll-dice" class="roll-dice" aria-hidden="true">🎲</div>
      <h2 id="roll-title">주사위를 굴리는 중</h2>
      <p id="roll-rule" class="roll-rule"></p>
      <strong id="roll-number" class="roll-number">?</strong>
      <p id="roll-result" class="roll-result"></p>
    </section>
  </div>

  <template id="choice-template">
    <button class="choice-card" type="button">
      <span class="choice-top"><strong class="choice-title"></strong><span class="choice-cost"></span></span>
      <span class="choice-description"></span>
      <span class="choice-chance" hidden></span>
      <span class="choice-impact"></span>
    </button>
  </template>

  <script src="./game-data.js"></script>
  <script src="./game.js"></script>
</body>
</html>
